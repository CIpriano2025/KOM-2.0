<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="40%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Shadow filter -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Abstract geometric patterns -->
  <g opacity="0.04">
    <circle cx="200" cy="100" r="300" fill="#e94560"/>
    <circle cx="1100" cy="500" r="400" fill="#0f3460"/>
    <circle cx="640" cy="320" r="250" fill="#16213e"/>
  </g>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- ===== LOGO MARK ===== -->
  <g transform="translate(120, 195)">
    <!-- Outer hexagon -->
    <polygon points="128,8 237.6,68 237.6,188 128,248 18.4,188 18.4,68"
             fill="#0f3460" stroke="#e94560" stroke-width="2.5"/>
    <!-- Inner hexagon -->
    <polygon points="128,36 218.4,86 218.4,170 128,220 37.6,170 37.6,86"
             fill="none" stroke="rgba(233,69,96,0.25)" stroke-width="1.5"/>
    <!-- 6 phase dots (accent) -->
    <circle cx="128" cy="8" r="6" fill="#e94560" filter="url(#glow)"/>
    <circle cx="237.6" cy="68" r="6" fill="#e94560" filter="url(#glow)"/>
    <circle cx="237.6" cy="188" r="6" fill="#e94560" filter="url(#glow)"/>
    <circle cx="128" cy="248" r="6" fill="#e94560" filter="url(#glow)"/>
    <circle cx="18.4" cy="68" r="6" fill="#e94560" filter="url(#glow)"/>
    <circle cx="18.4" cy="188" r="6" fill="#e94560" filter="url(#glow)"/>
    <!-- K letter -->
    <g fill="#ffffff">
      <rect x="102" y="82" width="10" height="92" rx="4"/>
      <path d="M112 128 Q130 115 155 98 L155 88 Q130 105 112 118Z"/>
      <path d="M112 128 Q130 141 155 158 L155 168 Q130 151 112 138Z"/>
    </g>
    <circle cx="160" cy="168" r="7" fill="url(#accent)"/>
  </g>

  <!-- ===== RIGHT SIDE CONTENT ===== -->
  <g transform="translate(420, 160)">
    <!-- Main title -->
    <text x="0" y="60" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="72" font-weight="800" fill="#ffffff" letter-spacing="6">
      KOM 2.0
    </text>

    <!-- Subtitle -->
    <text x="0" y="110" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="24" font-weight="600" fill="#e94560" letter-spacing="5">
      KNOWLEDGE ORCHESTRATED METHOD
    </text>

    <!-- Divider line -->
    <line x1="0" y1="135" x2="500" y2="135" stroke="#e94560" stroke-width="2" opacity="0.5"/>

    <!-- Tagline -->
    <text x="0" y="170" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="18" font-weight="300" fill="rgba(255,255,255,0.7)" letter-spacing="2">
      O primeiro protocolo de navegação para agentes de IA
    </text>

    <!-- Description -->
    <text x="0" y="210" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="14" font-weight="400" fill="rgba(255,255,255,0.5)" letter-spacing="1">
      6 fases · Gates de verificação · Registry · Radar · Retrospect · Grafo de conhecimento
    </text>

    <!-- Badges -->
    <g transform="translate(0, 250)">
      <rect x="0" y="0" width="80" height="30" rx="15" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
      <text x="40" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="12"
            font-weight="700" fill="#e94560" text-anchor="middle">v2.0</text>

      <rect x="95" y="0" width="70" height="30" rx="15" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <text x="130" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="12"
            font-weight="500" fill="rgba(255,255,255,0.6)" text-anchor="middle">MIT</text>

      <rect x="180" y="0" width="120" height="30" rx="15" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <text x="240" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="12"
            font-weight="500" fill="rgba(255,255,255,0.6)" text-anchor="middle">PRODUCTION</text>
    </g>
  </g>

  <!-- ===== BOTTOM BAR: Compatible Agents ===== -->
  <g transform="translate(0, 530)">
    <rect width="1280" height="110" fill="rgba(0,0,0,0.3)"/>
    <text x="640" y="30" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="14" font-weight="500" fill="rgba(255,255,255,0.4)"
          text-anchor="middle" letter-spacing="3">AGENTES COMPATIVEIS</text>

    <!-- Agent badges -->
    <g transform="translate(240, 55)">
      <rect x="0" y="0" width="130" height="36" rx="18" fill="rgba(15,52,96,0.6)" stroke="rgba(233,69,96,0.3)" stroke-width="1"/>
      <text x="65" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="13"
            font-weight="600" fill="#fff" text-anchor="middle">OpenCode</text>

      <rect x="145" y="0" width="130" height="36" rx="18" fill="rgba(15,52,96,0.6)" stroke="rgba(233,69,96,0.3)" stroke-width="1"/>
      <text x="210" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="13"
            font-weight="600" fill="#fff" text-anchor="middle">Claude Code</text>

      <rect x="290" y="0" width="130" height="36" rx="18" fill="rgba(15,52,96,0.6)" stroke="rgba(233,69,96,0.3)" stroke-width="1"/>
      <text x="355" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="13"
            font-weight="600" fill="#fff" text-anchor="middle">Codex CLI</text>

      <rect x="435" y="0" width="130" height="36" rx="18" fill="rgba(15,52,96,0.6)" stroke="rgba(233,69,96,0.3)" stroke-width="1"/>
      <text x="500" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="13"
            font-weight="600" fill="#fff" text-anchor="middle">Gemini CLI</text>

      <rect x="580" y="0" width="130" height="36" rx="18" fill="rgba(15,52,96,0.6)" stroke="rgba(233,69,96,0.3)" stroke-width="1"/>
      <text x="645" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="13"
            font-weight="600" fill="#fff" text-anchor="middle">Cursor</text>
    </g>
  </g>

  <!-- ===== 6 PHASE LABELS (around hexagon) ===== -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle" font-weight="500">
    <text x="248" y="95" transform="rotate(-30, 248, 95)">ORIENTAÇÃO</text>
    <text x="268" y="200" transform="rotate(30, 268, 200)">ARQUITETURA</text>
    <text x="178" y="305">CONTRATO</text>
    <text x="78" y="305">EXECUÇÃO</text>
    <text x="-12" y="200" transform="rotate(-30, -12, 200)">VERIFICAÇÃO</text>
    <text x="-28" y="95" transform="rotate(30, -28, 95)">REGISTRO</text>
  </g>
</svg>
